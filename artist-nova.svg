:root {
    --bg: #050509;
    --bg-soft: #0c0c14;
    --card: rgba(255,255,255,0.07);
    --card-strong: rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.14);
    --text: #f7f4ff;
    --muted: #a8a2ba;
    --gold: #ffd166;
    --gold-2: #f9a826;
    --purple: #8b5cf6;
    --purple-2: #c084fc;
    --pink: #ec4899;
    --green: #20e3b2;
    --danger: #ff4d6d;
    --success: #46e891;
    --shadow: 0 24px 70px rgba(0,0,0,.45);
    --radius: 24px;
    --header-h: 78px;
}

[data-theme="royal"] {
    --gold: #e6c15a;
    --purple: #6d5dfc;
    --pink: #ff6ac1;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at 15% 10%, rgba(139,92,246,.28), transparent 28rem),
        radial-gradient(circle at 78% 15%, rgba(255,209,102,.16), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(236,72,153,.13), transparent 34rem),
        var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button, input, select, textarea { font: inherit; }

.glass {
    background: rgba(10,10,18,.64);
    border: 1px solid var(--border);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
}

.loading-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: grid;
    place-items: center;
    align-content: center;
    gap: 1rem;
    background: radial-gradient(circle at center, #151020, #050509 68%);
    transition: opacity .45s ease, visibility .45s ease;
}
.loading-screen.hide { opacity: 0; visibility: hidden; }
.loader-vinyl {
    width: 74px;
    height: 74px;
    border-radius: 999px;
    background: repeating-radial-gradient(circle, #111 0 7px, #20202a 8px 10px), radial-gradient(circle, var(--gold) 0 10px, transparent 11px);
    border: 2px solid rgba(255,255,255,.2);
    animation: spin 1.1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.site-header {
    height: var(--header-h);
    position: sticky;
    top: 14px;
    z-index: 1000;
    width: min(1180px, calc(100% - 28px));
    margin: 14px auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem 0 1.25rem;
    border-radius: 999px;
}
.brand {
    display: inline-flex;
    align-items: center;
    gap: .7rem;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -.04em;
}
.brand-orb {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: conic-gradient(from 45deg, var(--gold), var(--purple), var(--pink), var(--gold));
    box-shadow: 0 0 24px rgba(139,92,246,.72);
    position: relative;
}
.brand-orb::after {
    content: '';
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    background: var(--bg);
}
.main-nav { display: flex; align-items: center; gap: .25rem; }
.main-nav a {
    padding: .75rem 1rem;
    color: var(--muted);
    border-radius: 999px;
    transition: .25s ease;
    font-weight: 700;
}
.main-nav a:hover { color: var(--text); background: rgba(255,255,255,.08); }
.nav-pill, .btn.primary {
    background: linear-gradient(135deg, var(--gold), var(--purple));
    color: #120f18 !important;
    box-shadow: 0 14px 30px rgba(139,92,246,.28);
}
.hamburger { display: none; background: transparent; border: 0; width: 44px; height: 44px; cursor: pointer; }
.hamburger span { display: block; height: 2px; background: var(--text); margin: 7px; border-radius: 4px; }

.page-wrap { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 2rem 0 4rem; }
.hero {
    min-height: calc(100vh - 110px);
    display: grid;
    grid-template-columns: 1.05fr .95fr;
    gap: 2rem;
    align-items: center;
    position: relative;
}
.hero::before {
    content: '';
    position: absolute;
    inset: 6% -18% auto auto;
    width: 50vw;
    height: 50vw;
    background: conic-gradient(from 0deg, rgba(255,209,102,.2), rgba(139,92,246,.32), rgba(236,72,153,.2), rgba(255,209,102,.2));
    filter: blur(50px);
    animation: floaty 9s ease-in-out infinite;
    pointer-events: none;
}
@keyframes floaty { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-28px) rotate(10deg); } }
.eyebrow { color: var(--gold); font-weight: 900; letter-spacing: .15em; text-transform: uppercase; font-size: .78rem; }
.hero h1 { font-size: clamp(3.2rem, 8vw, 7.8rem); line-height: .88; margin: .7rem 0 1rem; letter-spacing: -.08em; }
.gradient-text { background: linear-gradient(135deg, var(--gold), var(--purple-2), var(--pink)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.lead { color: var(--muted); font-size: clamp(1rem, 2vw, 1.25rem); line-height: 1.8; max-width: 650px; }
.hero-actions, .row-actions { display: flex; gap: .8rem; flex-wrap: wrap; margin-top: 1.5rem; }
.btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,.08);
    color: var(--text);
    padding: .95rem 1.25rem;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 900;
    transition: .25s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 16px 34px rgba(0,0,0,.32); border-color: rgba(255,255,255,.32); }
.btn.danger { background: rgba(255,77,109,.12); color: #ffb3c1; border-color: rgba(255,77,109,.35); }
.btn.small { padding: .65rem .85rem; font-size: .9rem; }
.btn.full { width: 100%; }

.hero-player {
    position: relative;
    min-height: 520px;
    display: grid;
    place-items: center;
}
.orbit-card {
    width: min(430px, 100%);
    padding: 1.2rem;
    border-radius: 36px;
    position: relative;
    transform: rotate(-2deg);
    animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat { 50% { transform: translateY(-16px) rotate(1deg); } }
.cover-art {
    aspect-ratio: 1;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,209,102,.85), rgba(139,92,246,.85), rgba(236,72,153,.75));
    position: relative;
    overflow: hidden;
}
.cover-art::before, .cover-art::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    filter: blur(2px);
}
.cover-art::before { width: 180px; height: 180px; left: -40px; bottom: 40px; }
.cover-art::after { width: 250px; height: 250px; right: -80px; top: -50px; }
.visualizer { display: flex; align-items: end; gap: 7px; height: 72px; margin: 1.2rem 0; }
.visualizer span { flex: 1; border-radius: 9px; background: linear-gradient(var(--gold), var(--purple)); animation: bars 1s ease-in-out infinite; height: 35%; }
.visualizer span:nth-child(2n) { animation-delay: .18s; height: 70%; }
.visualizer span:nth-child(3n) { animation-delay: .34s; height: 48%; }
@keyframes bars { 0%,100% { transform: scaleY(.42); opacity: .65; } 50% { transform: scaleY(1); opacity: 1; } }
.track-meta h3 { margin: 0; font-size: 1.25rem; }
.track-meta p { margin: .35rem 0 0; color: var(--muted); }
.floating-chip {
    position: absolute;
    padding: .8rem 1rem;
    border-radius: 999px;
    color: var(--text);
    font-weight: 900;
    z-index: 2;
    animation: floaty 5s ease-in-out infinite;
}
.chip-1 { left: 0; top: 60px; }
.chip-2 { right: -5px; bottom: 70px; animation-delay: 1.4s; }

.section { margin: 4rem 0; }
.section-head { display: flex; justify-content: space-between; align-items: end; gap: 1rem; margin-bottom: 1.2rem; }
.section h2 { font-size: clamp(1.8rem, 4vw, 3rem); margin: 0; letter-spacing: -.05em; }
.section p { color: var(--muted); }
.grid { display: grid; gap: 1rem; }
.grid.cards { grid-template-columns: repeat(4, minmax(0,1fr)); }
.grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
.card {
    border: 1px solid var(--border);
    background: var(--card);
    backdrop-filter: blur(14px);
    border-radius: var(--radius);
    padding: 1rem;
    transition: .25s ease;
    position: relative;
    overflow: hidden;
}
.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top left, rgba(255,209,102,.13), transparent 46%), radial-gradient(circle at bottom right, rgba(139,92,246,.14), transparent 42%);
    opacity: 0;
    transition: .25s ease;
    pointer-events: none;
}
.card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,.26); }
.card:hover::before { opacity: 1; }
.song-cover, .artist-avatar, .playlist-cover {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
}
.artist-avatar { border-radius: 999px; }
.card-title { font-weight: 900; margin: .9rem 0 .2rem; }
.card-sub { color: var(--muted); font-size: .92rem; }
.song-row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: .9rem;
    align-items: center;
    padding: .75rem;
    border-radius: 18px;
    background: rgba(255,255,255,.045);
    border: 1px solid rgba(255,255,255,.08);
    transition: .22s ease;
}
.song-row:hover { background: rgba(255,255,255,.08); transform: translateX(4px); }
.song-row img { width: 56px; height: 56px; object-fit: cover; border-radius: 15px; }
.song-row h4 { margin: 0 0 .2rem; }
.song-row p { margin: 0; color: var(--muted); }
.badge { padding: .35rem .6rem; border-radius: 999px; background: rgba(255,209,102,.14); color: var(--gold); font-weight: 800; font-size: .75rem; }

.auth-shell { min-height: calc(100vh - 220px); display: grid; place-items: center; }
.auth-card { width: min(480px, 100%); padding: 2rem; border-radius: 30px; }
.form-grid { display: grid; gap: 1rem; }
.input-group { display: grid; gap: .45rem; }
label { color: var(--muted); font-weight: 800; }
input, select, textarea {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.06);
    color: var(--text);
    border-radius: 16px;
    padding: .9rem 1rem;
    outline: 0;
    transition: .2s ease;
}
select option { color: #111; }
input:focus, select:focus, textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(139,92,246,.12); }
.helper { color: var(--muted); font-size: .9rem; }
.error-box, .success-box { padding: .9rem 1rem; border-radius: 16px; margin-bottom: 1rem; }
.error-box { background: rgba(255,77,109,.12); color: #ffc0cb; border: 1px solid rgba(255,77,109,.25); }
.success-box { background: rgba(70,232,145,.1); color: #c7ffdc; border: 1px solid rgba(70,232,145,.25); }

.search-shell { position: relative; margin: 1rem 0 1.5rem; }
.search-results {
    position: absolute;
    inset: calc(100% + 10px) 0 auto;
    background: rgba(12,12,20,.96);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: .8rem;
    z-index: 50;
    display: none;
    max-height: 440px;
    overflow: auto;
}
.search-results.show { display: grid; gap: .5rem; }
.search-item { display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: .8rem; padding: .6rem; border-radius: 14px; cursor: pointer; }
.search-item:hover { background: rgba(255,255,255,.08); }
.search-item img { width: 44px; height: 44px; object-fit: cover; border-radius: 11px; }

.player-layout { display: grid; grid-template-columns: 290px 1fr 300px; gap: 1rem; align-items: start; }
.sidebar, .queue-panel, .player-stage { border-radius: 28px; padding: 1rem; }
.sidebar { position: sticky; top: 105px; }
.sidebar a { display: flex; align-items: center; gap: .6rem; color: var(--muted); padding: .8rem .9rem; border-radius: 16px; font-weight: 800; }
.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.08); color: var(--text); }
.player-stage { min-height: 670px; display: grid; align-content: start; gap: 1rem; }
.now-playing-cover { width: min(440px, 100%); margin: 0 auto; border-radius: 36px; aspect-ratio: 1; object-fit: cover; box-shadow: 0 34px 90px rgba(0,0,0,.5); }
.now-title { text-align: center; font-size: clamp(2rem, 5vw, 4.4rem); letter-spacing: -.07em; margin: .5rem 0 0; }
.now-artist { text-align: center; color: var(--muted); font-size: 1.1rem; }
.controls { display: flex; align-items: center; justify-content: center; gap: .75rem; flex-wrap: wrap; }
.icon-btn {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.08);
    color: var(--text);
    cursor: pointer;
    transition: .22s ease;
    display: grid;
    place-items: center;
    font-weight: 900;
}
.icon-btn:hover, .icon-btn.active { background: rgba(255,209,102,.16); color: var(--gold); transform: translateY(-2px); }
.icon-btn.play { width: 66px; height: 66px; background: linear-gradient(135deg, var(--gold), var(--purple)); color: #120f18; font-size: 1.35rem; }
.progress-wrap { display: grid; grid-template-columns: 48px 1fr 48px; align-items: center; gap: .8rem; color: var(--muted); font-weight: 700; }
.range { accent-color: var(--gold); }
.volume-wrap { display: flex; align-items: center; gap: .5rem; justify-content: center; }
.queue-list { display: grid; gap: .6rem; max-height: 520px; overflow: auto; }
.queue-item { display: grid; grid-template-columns: 46px 1fr; gap: .7rem; align-items: center; padding: .55rem; border-radius: 14px; cursor: pointer; }
.queue-item:hover, .queue-item.active { background: rgba(255,255,255,.08); }
.queue-item img { width: 46px; height: 46px; object-fit: cover; border-radius: 12px; }
.queue-item h4 { margin: 0; font-size: .92rem; }
.queue-item p { margin: .15rem 0 0; color: var(--muted); font-size: .82rem; }
/* Bottom player bar styled like a premium Spotify-style control strip */
.player-layout { margin-bottom: 7rem; }
.mini-player {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: min(1180px, 100%);
    min-height: 86px;
    display: grid;
    grid-template-columns: minmax(160px, 260px) 1fr minmax(120px, 210px);
    align-items: center;
    gap: 1rem;
    padding: .7rem 1.4rem .95rem;
    border-radius: 22px 22px 0 0;
    z-index: 900;
    background: rgba(0,0,0,.94);
    border: 1px solid rgba(255,255,255,.08);
    border-bottom: 0;
    box-shadow: 0 -18px 50px rgba(0,0,0,.42);
    backdrop-filter: blur(18px);
}
.mini-track-meta { display: flex; align-items: center; gap: .75rem; min-width: 0; }
.mini-track-meta img { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; }
.mini-track-meta h4 { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .95rem; }
.mini-track-meta p { margin: .12rem 0 0; color: #9b96a8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .82rem; }
.mini-center { display: grid; gap: .72rem; align-items: center; }
.mini-controls-row {
    display: grid;
    grid-template-columns: 54px 44px 44px 62px 44px 44px 54px;
    align-items: center;
    justify-content: center;
    gap: .7rem;
}
.mini-time { color: #9b96a8; font-weight: 800; font-size: .88rem; text-align: center; }
.mini-icon, .mini-play-btn {
    border: 0;
    background: transparent;
    color: #f7f4ff;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform .18s ease, color .18s ease, background .18s ease;
}
.mini-icon { width: 42px; height: 42px; border-radius: 50%; font-size: 1.05rem; }
.mini-icon:hover, .mini-icon.active { color: var(--purple-2); transform: translateY(-1px) scale(1.08); }
.mini-play-btn {
    width: 58px;
    height: 58px;
    border-radius: 999px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #ffffff;
    font-size: 1.25rem;
    box-shadow: 0 0 30px rgba(139,92,246,.42);
}
.mini-play-btn:hover { transform: scale(1.07); box-shadow: 0 0 42px rgba(168,85,247,.62); }
.player-bar-range {
    width: 100%;
    height: 4px;
    border-radius: 999px;
    appearance: none;
    -webkit-appearance: none;
    background: linear-gradient(90deg, #9b00ff var(--progress, 0%), rgba(255,255,255,.86) var(--progress, 0%));
    outline: none;
    cursor: pointer;
}
.player-bar-range::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 0;
    height: 0;
}
.player-bar-range:hover::-webkit-slider-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 0 5px rgba(155,0,255,.22);
}
.player-bar-range::-moz-range-thumb { width: 0; height: 0; border: 0; }
.player-bar-range:hover::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #ffffff; border: 0; }
.mini-volume { display: flex; align-items: center; justify-content: flex-end; gap: .55rem; color: #bdb7ca; }
.player-bar-volume { width: 110px; accent-color: var(--purple); }
.fullscreen-mode .player-layout { grid-template-columns: 1fr; }
.fullscreen-mode .sidebar, .fullscreen-mode .queue-panel { display: none; }

.profile-head { display: grid; grid-template-columns: 130px 1fr; gap: 1.2rem; align-items: center; padding: 1.4rem; border-radius: 30px; margin-bottom: 1rem; }
.profile-head img { width: 130px; height: 130px; object-fit: cover; border-radius: 34px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 1rem; margin: 1rem 0; }
.stat { padding: 1rem; border-radius: 22px; background: rgba(255,255,255,.06); border: 1px solid var(--border); }
.stat strong { display: block; font-size: 2rem; }
.table-wrap { overflow-x: auto; border-radius: 22px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { text-align: left; padding: .9rem; border-bottom: 1px solid rgba(255,255,255,.08); }
th { color: var(--gold); background: rgba(255,255,255,.04); }
td { color: var(--muted); }
.admin-shell { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; }
.admin-nav { position: sticky; top: 100px; padding: 1rem; border-radius: 26px; }
.admin-nav a { display: block; padding: .8rem .9rem; border-radius: 15px; color: var(--muted); font-weight: 800; }
.admin-nav a:hover, .admin-nav a.active { background: rgba(255,255,255,.08); color: var(--text); }

.toast-stack { position: fixed; right: 18px; top: 105px; z-index: 10000; display: grid; gap: .6rem; }
.toast { padding: .85rem 1rem; border-radius: 16px; background: rgba(12,12,20,.94); border: 1px solid var(--border); box-shadow: var(--shadow); min-width: 260px; animation: slideIn .25s ease; }
.toast.success { border-color: rgba(70,232,145,.4); }
.toast.error { border-color: rgba(255,77,109,.4); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }
.site-footer { width: min(1180px, calc(100% - 28px)); margin: 3rem auto 2rem; display: flex; justify-content: space-between; gap: 1rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 1.5rem; }
.footer-links { display: flex; gap: .9rem; flex-wrap: wrap; }
.footer-links a:hover { color: var(--gold); }
.footer-brand { color: var(--text); }

@media (max-width: 1050px) {
    .hero { grid-template-columns: 1fr; padding-top: 2rem; }
    .grid.cards { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .player-layout { grid-template-columns: 1fr; }
    .sidebar, .queue-panel { position: static; }
    .admin-shell { grid-template-columns: 1fr; }
    .admin-nav { position: static; display: flex; flex-wrap: wrap; }
}
@media (max-width: 760px) {
    :root { --header-h: 68px; }
    .site-header { top: 8px; width: calc(100% - 16px); }
    .hamburger { display: block; }
    .main-nav { position: absolute; left: 0; right: 0; top: calc(100% + 10px); display: none; flex-direction: column; align-items: stretch; padding: .8rem; border-radius: 24px; background: rgba(12,12,20,.96); border: 1px solid var(--border); }
    .main-nav.show { display: flex; }
    .hero h1 { font-size: 4rem; }
    .grid.cards, .grid.two, .stats-grid { grid-template-columns: 1fr; }
    .profile-head { grid-template-columns: 1fr; text-align: center; }
    .profile-head img { margin: 0 auto; }
    .site-footer { flex-direction: column; }
    .progress-wrap { grid-template-columns: 42px 1fr 42px; }
    .mini-player {
        width: 100%;
        grid-template-columns: 1fr;
        min-height: 96px;
        padding: .7rem .85rem .95rem;
        border-radius: 18px 18px 0 0;
    }
    .mini-track-meta, .mini-volume { display: none; }
    .mini-controls-row {
        grid-template-columns: 45px 36px 36px 54px 36px 36px 45px;
        gap: .35rem;
    }
    .mini-icon { width: 34px; height: 34px; font-size: .95rem; }
    .mini-play-btn { width: 50px; height: 50px; }
    .mini-time { font-size: .78rem; }
}


/* Admin CRUD additions */
.admin-form-grid {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    align-items: end;
}
.admin-thumb {
    width: 54px;
    height: 54px;
    object-fit: cover;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.06);
    box-shadow: 0 10px 26px rgba(0,0,0,.25);
}
.admin-thumb.large {
    width: 110px;
    height: 110px;
    border-radius: 26px;
}
.table-actions {
    display: flex;
    gap: .45rem;
    align-items: center;
    flex-wrap: wrap;
}
.table-actions form { margin: 0; }
.check-line {
    display: flex;
    gap: .6rem;
    align-items: center;
    font-weight: 800;
    color: var(--muted);
}
.check-line input { width: auto; }
.checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: .7rem;
    max-height: 260px;
    overflow: auto;
    padding: .85rem;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: rgba(255,255,255,.04);
}
.checkbox-grid label {
    display: flex;
    gap: .55rem;
    align-items: center;
    color: var(--text);
    font-weight: 700;
}
.checkbox-grid input { width: auto; }
.checkbox-grid span {
    color: var(--muted);
    font-size: .82rem;
    font-weight: 600;
}
.mini-feature-list, .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: .65rem;
    margin-top: 1rem;
}

/* Dark / Light mode upgrade */
[data-theme="light"] {
    --bg: #f6f2ff;
    --bg-soft: #fffaf0;
    --card: rgba(255,255,255,0.72);
    --card-strong: rgba(255,255,255,0.88);
    --border: rgba(43,30,72,0.16);
    --text: #17111f;
    --muted: #665a77;
    --gold: #b8860b;
    --gold-2: #d49a13;
    --purple: #6d3fe2;
    --purple-2: #8b5cf6;
    --pink: #c026d3;
    --green: #057a65;
    --shadow: 0 24px 60px rgba(72,47,130,.14);
}
[data-theme="light"] body {
    background:
        radial-gradient(circle at 15% 10%, rgba(109,63,226,.15), transparent 28rem),
        radial-gradient(circle at 78% 15%, rgba(184,134,11,.14), transparent 26rem),
        radial-gradient(circle at 50% 100%, rgba(192,38,211,.09), transparent 34rem),
        var(--bg);
}
[data-theme="light"] .glass,
[data-theme="light"] .site-header,
[data-theme="light"] .search-results,
[data-theme="light"] .toast {
    background: rgba(255,255,255,.82);
}
[data-theme="light"] .loading-screen {
    background: radial-gradient(circle at center, #ffffff, #f6f2ff 68%);
}
[data-theme="light"] .main-nav.show {
    background: rgba(255,255,255,.96);
}
[data-theme="light"] input,
[data-theme="light"] select,
[data-theme="light"] textarea {
    background: rgba(255,255,255,.82);
}
[data-theme="light"] .card,
[data-theme="light"] .song-row,
[data-theme="light"] .queue-item,
[data-theme="light"] .stat,
[data-theme="light"] .checkbox-grid {
    background: rgba(255,255,255,.62);
}

[data-theme="light"] .mini-player {
    background: rgba(255,255,255,.94);
    border-color: rgba(43,30,72,.12);
    box-shadow: 0 -18px 44px rgba(72,47,130,.14);
}
[data-theme="light"] .mini-icon { color: #17111f; }
[data-theme="light"] .mini-time,
[data-theme="light"] .mini-track-meta p,
[data-theme="light"] .mini-volume { color: #665a77; }
[data-theme="light"] .player-bar-range {
    background: linear-gradient(90deg, var(--purple) var(--progress, 0%), rgba(23,17,31,.22) var(--progress, 0%));
}

[data-theme="light"] .brand-orb::after { background: var(--bg); }
[data-theme="light"] .nav-pill,
[data-theme="light"] .btn.primary,
[data-theme="light"] .icon-btn.play {
    color: #150f08 !important;
}
.theme-toggle {
    border: 1px solid var(--border);
    background: rgba(255,255,255,.08);
    color: var(--text);
    border-radius: 999px;
    padding: .72rem .95rem;
    cursor: pointer;
    font-weight: 900;
    transition: .22s ease;
    white-space: nowrap;
}
.theme-toggle:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.34); }
.album-hero {
    display: grid;
    grid-template-columns: minmax(230px, 330px) 1fr;
    gap: 1.4rem;
    align-items: end;
    padding: 1.2rem;
    border-radius: 34px;
    margin: 2rem 0 1rem;
}
.album-hero img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 28px;
    box-shadow: 0 28px 70px rgba(0,0,0,.32);
}
.album-hero h1 {
    font-size: clamp(2.4rem, 7vw, 6rem);
    letter-spacing: -.08em;
    line-height: .9;
    margin: .5rem 0;
}
.album-meta-row { display: flex; flex-wrap: wrap; gap: .55rem; align-items: center; color: var(--muted); }
.album-meta-row .badge { color: var(--gold); }
.link-card { display: block; color: inherit; }
.empty-state {
    padding: 2rem;
    border-radius: 26px;
    border: 1px dashed var(--border);
    color: var(--muted);
    text-align: center;
}
@media (max-width: 760px) {
    .theme-toggle { position: absolute; right: 62px; top: 12px; padding: .58rem .7rem; font-size: .82rem; }
    .album-hero { grid-template-columns: 1fr; }
}

/* Global background player, queue drawer, and playlist modal */
.page-wrap { padding-bottom: 8.5rem; }
.queue-actions { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .35rem; }
.micro-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,.08);
    color: var(--text);
    border-radius: 999px;
    padding: .28rem .55rem;
    font-size: .72rem;
    font-weight: 800;
    cursor: pointer;
    transition: .2s ease;
}
.micro-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.14); }
.micro-btn.danger { color: var(--danger); }
.queue-list.compact { max-height: calc(100vh - 230px); }
.queue-list.long-list { max-height: none; overflow: visible; }
.queue-drawer,
.playlist-modal {
    position: fixed;
    right: 18px;
    bottom: 104px;
    width: min(430px, calc(100% - 28px));
    max-height: calc(100vh - 140px);
    overflow: auto;
    border-radius: 26px;
    padding: 1rem;
    z-index: 1200;
    opacity: 0;
    pointer-events: none;
    transform: translateY(18px) scale(.98);
    transition: opacity .22s ease, transform .22s ease;
}
.playlist-modal { left: 50%; right: auto; top: 50%; bottom: auto; transform: translate(-50%, -45%) scale(.98); }
.queue-drawer.show { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
.playlist-modal.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
.modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.42);
    backdrop-filter: blur(4px);
    z-index: 1100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
}
.modal-backdrop.show { opacity: 1; pointer-events: auto; }
.drawer-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
.drawer-head h3 { margin: 0; }
.drawer-actions { display: flex; align-items: center; justify-content: space-between; gap: .7rem; margin-top: 1rem; flex-wrap: wrap; }
.playlist-chooser { display: grid; gap: .55rem; }
.playlist-choice {
    width: 100%;
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: .7rem;
    align-items: center;
    text-align: left;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.07);
    color: var(--text);
    border-radius: 16px;
    padding: .55rem;
    cursor: pointer;
    transition: .2s ease;
}
.playlist-choice:hover { background: rgba(255,255,255,.12); transform: translateY(-1px); }
.playlist-choice img { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; }
.playlist-choice strong { display: block; }
.playlist-choice small { color: var(--muted); }
.empty-state.small { padding: .8rem; font-size: .9rem; }
.small-lead { font-size: 1rem; max-width: 720px; }

@media (max-width: 760px) {
    .queue-drawer,
    .playlist-modal {
        right: 8px;
        left: 8px;
        width: auto;
        bottom: 112px;
        max-height: calc(100vh - 140px);
    }
    .playlist-modal { top: auto; transform: translateY(18px) scale(.98); }
    .playlist-modal.show { transform: translateY(0) scale(1); }
    .drawer-actions { justify-content: stretch; }
    .drawer-actions .btn { flex: 1; text-align: center; }
}

[data-theme="light"] .queue-drawer,
[data-theme="light"] .playlist-modal,
[data-theme="light"] .playlist-choice,
[data-theme="light"] .micro-btn {
    background: rgba(255,255,255,.9);
}
@media (max-width: 760px) {
    .mini-player { position: fixed; }
    .mini-volume {
        display: flex !important;
        position: absolute;
        right: .55rem;
        top: .55rem;
        width: auto;
    }
    .mini-volume span,
    .mini-volume input { display: none; }
    #miniQueueBtn { display: grid; }
}
